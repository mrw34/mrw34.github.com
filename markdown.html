<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown</title>
<link href="http://markwoodbridge.com" title="Mark Woodbridge" rel="author"/>
<body>
  <script src="//rawgithub.com/chjj/marked/master/lib/marked.js"></script>
  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script>
    $.get('https://api.github.com/gists/' + window.location.search.split('id=')[1], function(data) {
      $('body').html(marked(data.files[Object.keys(data.files)[0]].content));
    });
  </script>
</body>
