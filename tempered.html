<script>
    fetch('https://tempered.markwoodbridge.com')
        .then(response => response.json())
        .then(data => {
            var lineChartData = {
                labels: data.map(e => e.timestamp),
                datasets: [{
                    label: 'Temperature',
                    borderColor: 'rgb(255, 99, 132)',
                    fill: false,
                    data: data.map(e => e.temperature),
                    yAxisID: 'y-axis-1',
                    pointRadius: 0,
                    // lineTension: 0,
                    borderWidth: 2
                }, {
                    label: 'Humidity',
                    borderColor: 'rgb(54, 162, 235)',
                    fill: false,
                    data: data.map(e => e.humidity),
                    yAxisID: 'y-axis-2',
                    pointRadius: 0,
                    // lineTension: 0,
                    borderWidth: 2
                }]
            };

            var ctx = document.getElementById('canvas').getContext('2d');
            window.myLine = Chart.Line(ctx, {
                data: lineChartData,
                options: {
                    // responsive: true,
                    // hoverMode: 'index',
                    // stacked: false,
                    // title: {
                    //     display: true,
                    //     text: 'Chart.js Line Chart - Multi Axis'
                    // },
                    scales: {
                        xAxes: [{
                            type: 'time',
                            // display: true,
                            // scaleLabel: {
                            //     display: true,
                            //     labelString: 'Date'
                            // },
                            // ticks: {
                            //     major: {
                            //         fontStyle: 'bold',
                            //         fontColor: '#FF0000'
                            //     }
                            // }
                        }],
                        yAxes: [{
                            //         type: 'linear', // only linear but allow scale type registration. This allows extensions to exist solely for log scale for instance
                            //         display: true,
                            position: 'left',
                            id: 'y-axis-1',
                        }, {
                            //         type: 'linear', // only linear but allow scale type registration. This allows extensions to exist solely for log scale for instance
                            //         display: true,
                            position: 'right',
                            id: 'y-axis-2',

                            //         // grid line settings
                            //         gridLines: {
                            //             drawOnChartArea: false, // only want the grid lines for one axis to show up
                            //         },
                        }],
                    }
                }
            });
        });
</script>
