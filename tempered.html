<!doctype html>
<html lang="en">

<head>
    <title>Tempered</title>
    <style>
        body {
            font-family: sans-serif;
            font-size: 0.8rem;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<h1>Tempered</h1>
<div id="chart"></div>
<script src="https://unpkg.com/react/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
<script type="text/babel">

    const tickFormatter = (tick) => new Date(tick).toLocaleDateString();

    class Chart extends React.PureComponent {
        constructor(props) {
            super(props);
            this.state = {
                error: null,
                isLoaded: false,
                data: []
            };
        }

        componentDidMount() {
            fetch("https://tempered.markwoodbridge.com")
                .then(res => res.json())
                .then(
                    (data) => {
                        this.setState({
                            isLoaded: true,
                            data
                        });
                    },
                    (error) => {
                        this.setState({
                            isLoaded: true,
                            error
                        });
                    }
                )
        }

        render() {
            const { data } = this.state;
            return (
                <Recharts.ResponsiveContainer width="100%" aspect={2}>
                    < Recharts.LineChart width={800} height={400} data={data} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
                        <Recharts.CartesianGrid strokeDasharray="3 3" />
                        <Recharts.XAxis dataKey="timestamp" tickFormatter={tickFormatter} />
                        <Recharts.YAxis yAxisId="left" />
                        <Recharts.YAxis yAxisId="right" orientation="right" />
                        <Recharts.Tooltip />
                        <Recharts.Legend />
                        <Recharts.Line yAxisId="left" type="monotone" dataKey="temperature" stroke="#8884d8" dot={false} />
                        <Recharts.Line yAxisId="right" type="monotone" dataKey="humidity" stroke="#82ca9d" dot={false} />
                    </Recharts.LineChart >
                </Recharts.ResponsiveContainer >
            );
        }
    }

    ReactDOM.render(<Chart />, document.getElementById('chart'));

</script>
